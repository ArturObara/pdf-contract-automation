version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: pv_postgres_db
    restart: always
    environment:
      POSTGRES_USER: artur_user
      POSTGRES_PASSWORD: secure_password123
      POSTGRES_DB: pv_contracts
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  web:
    build: .
    container_name: pv_fastapi_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://artur_user:secure_password123@db:5432/pv_contracts
    depends_on:
      - db

  ui:
    build: .
    container_name: pv_streamlit_ui
    restart: always
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://web:8000
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - web

volumes:
  postgres_data: